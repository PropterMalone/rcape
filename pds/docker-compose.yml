services:
  pds:
    # Pinned by digest (pds 0.4.219) so a recreate can't pull a breaking change.
    # To upgrade: bump the digest deliberately, then `docker compose pull && up -d`.
    image: ghcr.io/bluesky-social/pds@sha256:e0b756701c924410532c61b546a61810b6a0059bcebb0c21718d161f5b7880db
    container_name: rcape-pds
    restart: unless-stopped
    ports:
      - "2583:3000"
    env_file:
      - pds.env
    volumes:
      - ./data:/pds
